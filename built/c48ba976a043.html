<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tap Forge</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
body {
  background: #0d0d0d; color: #fff;
  font-family: 'Segoe UI', Arial, sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; overflow: hidden; position: relative;
  user-select: none;
}
#screen-shake { width: 100%; max-width: 480px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
#top-bar {
  width: 100%; background: #1a1a1a; border-bottom: 1px solid #ff6b1a33;
  padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
}
#coins-display { font-size: 1.1rem; color: #ffd700; font-weight: bold; }
#income-display { font-size: 0.75rem; color: #ff6b1a; }
#prestige-display { font-size: 0.75rem; color: #bf6fff; display: none; }
#grid-area {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; width: 100%; padding: 12px;
}
#grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; max-width: 380px; }
.slot {
  aspect-ratio: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 10px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; cursor: pointer; overflow: hidden;
}
.slot.empty { border-style: dashed; border-color: #2a2a2a; }
.slot.has-item { border-color: #ff6b1a44; }
.slot.drag-over { border-color: #ff6b1a; background: #1f1008; }
.slot .item-emoji { font-size: 2rem; line-height: 1; }
.slot .item-tier { font-size: 0.55rem; color: #888; margin-top: 2px; text-transform: uppercase; }
.slot .item-glow { position: absolute; inset: 0; border-radius: 10px; pointer-events: none; }
.slot.tier-1 .item-glow { background: radial-gradient(circle at center, #88441122, transparent 70%); }
.slot.tier-2 .item-glow { background: radial-gradient(circle at center, #ff6b1a33, transparent 70%); }
.slot.tier-3 .item-glow { background: radial-gradient(circle at center, #ff990044, transparent 70%); }
.slot.tier-4 .item-glow { background: radial-gradient(circle at center, #ffe00044, transparent 70%); }
.slot.tier-5 .item-glow { background: radial-gradient(circle at center, #88ff0044, transparent 70%); }
.slot.tier-6 .item-glow { background: radial-gradient(circle at center, #00ffaa44, transparent 70%); }
.slot.tier-7 .item-glow { background: radial-gradient(circle at center, #00ccff55, transparent 70%); }
.slot.tier-8 .item-glow { background: radial-gradient(circle at center, #8855ff66, transparent 70%); }
.slot.tier-9 .item-glow { background: radial-gradient(circle at center, #ff44cc66, transparent 70%); }
.slot.tier-10 .item-glow { background: radial-gradient(circle at center, #ffffff88, transparent 70%); }
#bottom-area {
  width: 100%; padding: 12px 16px 20px; display: flex; flex-direction: column;
  align-items: center; gap: 10px; flex-shrink: 0;
}
#anvil-btn {
  width: 90px; height: 90px; border-radius: 50%; border: 3px solid #ff6b1a;
  background: radial-gradient(circle at 40% 35%, #3a1a00, #1a0a00);
  font-size: 2.8rem; cursor: pointer;
  box-shadow: 0 0 20px #ff6b1a66, 0 0 40px #ff6b1a22;
  display: flex; align-items: center; justify-content: center; line-height: 1;
  transition: transform 0.1s;
}
#anvil-btn:active { transform: scale(0.92); }
#prestige-btn {
  display: none; padding: 8px 20px;
  background: linear-gradient(135deg, #3d1a6e, #6a2da0);
  border: 1px solid #bf6fff; border-radius: 20px; color: #bf6fff;
  font-size: 0.85rem; cursor: pointer;
}
#particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
.float-text {
  position: fixed; font-size: 0.85rem; font-weight: bold; color: #ffd700;
  pointer-events: none; z-index: 200; animation: float-up 1.2s ease-out forwards;
}
@keyframes float-up { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }
.shaking { animation: shake 0.3s ease; }
@keyframes shake {
  0%,100% { transform: translate(0,0); }
  20% { transform: translate(-4px,2px); } 40% { transform: translate(4px,-2px); }
  60% { transform: translate(-3px,3px); } 80% { transform: translate(3px,-1px); }
}
#start-screen {
  position: fixed; inset: 0; background: #0d0d0d;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 1000; gap: 16px;
}
#start-screen h1 { font-size: 2.5rem; color: #ff6b1a; text-shadow: 0 0 20px #ff6b1a88; }
#start-screen p { color: #888; font-size: 0.9rem; text-align: center; max-width: 280px; line-height: 1.5; }
#start-btn {
  padding: 14px 40px; background: #ff6b1a; border: none; border-radius: 30px;
  color: #000; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 8px;
  box-shadow: 0 0 20px #ff6b1a88;
}
.hint { font-size: 0.7rem; color: #555; text-align: center; }
</style>
</head>
<body>
<div id="start-screen">
  <div style="font-size:3rem">⚒️</div>
  <h1>TAP FORGE</h1>
  <p>Tap the anvil to forge items.<br>Drag matching items to merge.<br>Tap an item to sell it!</p>
  <button id="start-btn">FORGE IT</button>
</div>
<canvas id="particles"></canvas>
<div id="screen-shake">
  <div id="top-bar">
    <div>
      <div id="coins-display">🪙 0</div>
      <div id="income-display">+0.00/sec idle</div>
    </div>
    <div id="prestige-display">✨ x1.0</div>
  </div>
  <div id="grid-area">
    <div id="grid"></div>
  </div>
  <div id="bottom-area">
    <div class="hint">Drag items to merge • Tap item to sell</div>
    <button id="anvil-btn">⚒️</button>
    <button id="prestige-btn">✨ PRESTIGE (x1.5 forever)</button>
  </div>
</div>
<script>
const TIERS=[null,
  {name:'Ore',emoji:'🪨'},{name:'Ingot',emoji:'🔶'},{name:'Dagger',emoji:'🗡️'},
  {name:'Sword',emoji:'⚔️'},{name:'Shield',emoji:'🛡️'},{name:'Axe',emoji:'🪓'},
  {name:'Staff',emoji:'🔮'},{name:'Relic',emoji:'🏺'},{name:'Crown',emoji:'👑'},
  {name:'Legendary',emoji:'🌟'}
];
const ROWS=6,COLS=4,TOTAL=ROWS*COLS;
let coins=0,prestigeMulti=1,prestigeCount=0;
let grid=Array(TOTAL).fill(null);
let dragState=null,lastTime=0;

const canvas=document.getElementById('particles');
const ctx=canvas.getContext('2d');
let particles=[];
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resizeCanvas();window.addEventListener('resize',resizeCanvas);

function spawnSparks(x,y,color='#ff6b1a',n=12){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1.5,life:1,decay:0.025+Math.random()*0.04,size:2+Math.random()*3,color});
  }
}
function updateParticles(dt){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){
    p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.vy+=0.12*dt*60;p.life-=p.decay*dt*60;
    ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

const gridEl=document.getElementById('grid');
const slots=[];
function buildGrid(){
  gridEl.innerHTML='';slots.length=0;
  for(let i=0;i<TOTAL;i++){
    const s=document.createElement('div');
    s.className='slot empty';s.dataset.index=i;
    s.innerHTML='<div class="item-emoji"></div><div class="item-tier"></div><div class="item-glow"></div>';
    gridEl.appendChild(s);slots.push(s);
  }
}
function renderGrid(){
  let hasHigh=false;
  for(let i=0;i<TOTAL;i++){
    const t=grid[i],s=slots[i];
    if(t===null){s.className='slot empty';s.querySelector('.item-emoji').textContent='';s.querySelector('.item-tier').textContent='';}
    else{
      s.className='slot has-item tier-'+t;
      s.querySelector('.item-emoji').textContent=TIERS[t].emoji;
      s.querySelector('.item-tier').textContent=TIERS[t].name;
      if(t>=8)hasHigh=true;
    }
  }
  document.getElementById('prestige-btn').style.display=hasHigh?'block':'none';
}
function sellVal(t){return Math.pow(1.5,t)*prestigeMulti;}
function idleIncome(){let r=0;for(let i=0;i<TOTAL;i++)if(grid[i])r+=sellVal(grid[i])*0.05;return r;}
function updateBar(){
  document.getElementById('coins-display').textContent='🪙 '+Math.floor(coins).toLocaleString();
  document.getElementById('income-display').textContent='+'+idleIncome().toFixed(2)+'/sec idle';
  if(prestigeCount>0){document.getElementById('prestige-display').style.display='block';document.getElementById('prestige-display').textContent='✨ x'+prestigeMulti.toFixed(2);}
}
function firstEmpty(){for(let i=0;i<TOTAL;i++)if(grid[i]===null)return i;return -1;}
function floatText(txt,x,y){
  const e=document.createElement('div');e.className='float-text';e.textContent=txt;
  e.style.left=(x-20)+'px';e.style.top=(y-10)+'px';document.body.appendChild(e);
  setTimeout(()=>e.remove(),1300);
}
function forgeItem(x,y){
  const idx=firstEmpty();if(idx===-1)return;
  grid[idx]=1;renderGrid();spawnSparks(x,y,'#ff6b1a',12);
  const a=document.getElementById('anvil-btn');
  a.style.transform='scale(0.88)';setTimeout(()=>a.style.transform='',120);
}
function sellItem(idx,x,y){
  const t=grid[idx];if(t===null)return;
  const v=sellVal(t);coins+=v;floatText('+'+Math.floor(v)+' 🪙',x,y);
  grid[idx]=null;renderGrid();updateBar();
}
function mergeItems(from,to){
  if(grid[from]===null||grid[to]===null||from===to||grid[from]!==grid[to])return false;
  const t=grid[from];
  if(t>=10){const v=sellVal(t)*2;coins+=v;const r=slots[to].getBoundingClientRect();floatText('+'+Math.floor(v)+' 🪙',r.left+r.width/2,r.top);grid[from]=null;grid[to]=null;}
  else{grid[from]=null;grid[to]=t+1;}
  const ss=document.getElementById('screen-shake');
  ss.classList.remove('shaking');void ss.offsetWidth;ss.classList.add('shaking');
  setTimeout(()=>ss.classList.remove('shaking'),350);
  const r=slots[to].getBoundingClientRect();
  const colors=['#ff6b1a','#ffcc00','#88ff44','#44ffcc','#44aaff','#8844ff','#ff44cc','#ff88ff','#ffffff'];
  spawnSparks(r.left+r.width/2,r.top+r.height/2,colors[Math.min(t-1,colors.length-1)],22);
  renderGrid();updateBar();return true;
}
function getSlotAt(x,y){
  const el=document.elementFromPoint(x,y);if(!el)return -1;
  const s=el.closest('.slot');if(!s)return -1;return parseInt(s.dataset.index);
}
function startDrag(idx,cx,cy){
  if(grid[idx]===null)return;
  const t=grid[idx],r=slots[idx].getBoundingClientRect();
  const clone=document.createElement('div');
  clone.style.cssText=`position:fixed;z-index:500;pointer-events:none;width:${r.width}px;height:${r.height}px;background:#2a1500;border:2px solid #ff6b1a;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:2rem;opacity:0.9;box-shadow:0 0 20px #ff6b1a88;transform:scale(1.1);`;
  clone.textContent=TIERS[t].emoji;document.body.appendChild(clone);
  const ox=cx-r.left,oy=cy-r.top;
  clone.style.left=(cx-ox)+'px';clone.style.top=(cy-oy)+'px';
  dragState={fromIndex:idx,clone,ox,oy,moved:false,startX:cx,startY:cy};
  slots[idx].style.opacity='0.35';
}
function moveDrag(cx,cy){
  if(!dragState)return;
  const dx=cx-dragState.startX,dy=cy-dragState.startY;
  if(Math.abs(dx)>5||Math.abs(dy)>5)dragState.moved=true;
  dragState.clone.style.left=(cx-dragState.ox)+'px';dragState.clone.style.top=(cy-dragState.oy)+'px';
  slots.forEach(s=>s.classList.remove('drag-over'));
  const to=getSlotAt(cx,cy);
  if(to!==-1&&to!==dragState.fromIndex&&grid[to]===grid[dragState.fromIndex])slots[to].classList.add('drag-over');
}
function endDrag(cx,cy){
  if(!dragState)return;
  const{fromIndex,clone,moved}=dragState;
  clone.remove();slots.forEach(s=>s.classList.remove('drag-over'));slots[fromIndex].style.opacity='';
  const to=getSlotAt(cx,cy);
  if(!moved){const r=slots[fromIndex].getBoundingClientRect();sellItem(fromIndex,r.left+r.width/2,r.top);}
  else if(to!==-1&&to!==fromIndex){
    if(!mergeItems(fromIndex,to)&&grid[to]===null){grid[to]=grid[fromIndex];grid[fromIndex]=null;renderGrid();}
  }
  dragState=null;
}
gridEl.addEventListener('mousedown',e=>{const s=e.target.closest('.slot');if(s)startDrag(parseInt(s.dataset.index),e.clientX,e.clientY);e.preventDefault();});
window.addEventListener('mousemove',e=>{if(dragState)moveDrag(e.clientX,e.clientY);});
window.addEventListener('mouseup',e=>{endDrag(e.clientX,e.clientY);});
gridEl.addEventListener('touchstart',e=>{const t=e.touches[0];const s=e.target.closest('.slot');if(s)startDrag(parseInt(s.dataset.index),t.clientX,t.clientY);e.preventDefault();},{passive:false});
window.addEventListener('touchmove',e=>{if(!dragState)return;moveDrag(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();},{passive:false});
window.addEventListener('touchend',e=>{if(!dragState)return;const t=e.changedTouches[0];endDrag(t.clientX,t.clientY);});
document.getElementById('anvil-btn').addEventListener('click',e=>{forgeItem(e.clientX,e.clientY);updateBar();});
document.getElementById('anvil-btn').addEventListener('touchend',e=>{const t=e.changedTouches[0];forgeItem(t.clientX,t.clientY);updateBar();e.preventDefault();});
document.getElementById('prestige-btn').addEventListener('click',()=>{
  if(!confirm('Prestige? Resets grid, gives permanent x1.5 multiplier!'))return;
  prestigeCount++;prestigeMulti=Math.pow(1.5,prestigeCount);
  grid=Array(TOTAL).fill(null);renderGrid();updateBar();
});
document.getElementById('start-btn').addEventListener('click',()=>{
  document.getElementById('start-screen').style.display='none';
  grid[0]=1;grid[1]=1;renderGrid();updateBar();
  lastTime=performance.now();requestAnimationFrame(loop);
});
function loop(now){
  const dt=Math.min((now-lastTime)/1000,0.1);lastTime=now;
  coins+=idleIncome()*dt;updateBar();updateParticles(dt);
  requestAnimationFrame(loop);
}
buildGrid();
</script>
</body>
</html>
