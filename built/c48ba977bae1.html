<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Cascade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#000;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}
#hud{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;flex-shrink:0;}
.hud-block{display:flex;flex-direction:column;align-items:center;}
.hud-label{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:1px;}
.hud-val{font-size:20px;font-weight:700;color:#fff;}
#timer-bar-wrap{height:3px;flex-shrink:0;background:#111;position:relative;}
#timer-bar{height:100%;background:#fff;transition:width linear;transform-origin:left;}
#board-wrap{flex:1;display:flex;align-items:stretch;justify-content:center;position:relative;overflow:hidden;}
#board-canvas{display:block;}
#overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#000b;flex-direction:column;gap:16px;}
#overlay h1{font-size:36px;font-weight:900;letter-spacing:4px;}
#overlay .sub{font-size:14px;color:#aaa;}
#overlay .score-line{font-size:24px;font-weight:700;}
#start-btn{padding:14px 36px;background:#fff;color:#000;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;letter-spacing:2px;}
#start-btn:hover{transform:scale(1.04);}
#combo-text{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);font-size:32px;font-weight:900;pointer-events:none;opacity:0;transition:opacity .3s;text-shadow:0 0 20px currentColor;}
</style>
</head>
<body>
<div id="hud">
  <div class="hud-block"><div class="hud-label">Score</div><div class="hud-val" id="score-val">0</div></div>
  <div class="hud-block"><div class="hud-label">Level</div><div class="hud-val" id="level-val">1</div></div>
  <div class="hud-block"><div class="hud-label">Next</div><canvas id="next-canvas" width="36" height="36" style="border-radius:6px;margin-top:2px;"></canvas></div>
</div>
<div id="timer-bar-wrap"><div id="timer-bar" style="width:100%"></div></div>
<div id="board-wrap">
  <canvas id="board-canvas"></canvas>
  <div id="combo-text"></div>
  <div id="overlay">
    <h1 style="color:#0ff">NEON CASCADE</h1>
    <div class="sub">Swipe columns · Match colors · Chain combos</div>
    <div id="final-score" style="display:none" class="score-line"></div>
    <button id="start-btn" onclick="startGame()">▶ PLAY</button>
  </div>
</div>
<script>
const COLS=7,ROWS=12;
const COLORS=['#00ffff','#ff00cc','#66ff00','#ffcc00','#aa44ff','#ff6644'];
const GLOW_COLORS=['#00ffff88','#ff00cc88','#66ff0088','#ffcc0088','#aa44ff88','#ff664488'];

let board,nextColor,activeCol,fallDelay,score,level,gameOver,animFrame;
let timerStart,timerDuration;
let tileSize,boardX,boardY,boardW,boardH;
let touchStartX=null;
let particles=[];

const canvas=document.getElementById('board-canvas');
const ctx=canvas.getContext('2d');
const nextCanvas=document.getElementById('next-canvas');
const nctx=nextCanvas.getContext('2d');

function sizeCanvas(){
  const wrap=document.getElementById('board-wrap');
  const W=wrap.clientWidth,H=wrap.clientHeight;
  tileSize=Math.floor(Math.min(W/COLS,(H)/ROWS)*0.95);
  boardW=tileSize*COLS;boardH=tileSize*ROWS;
  boardX=(W-boardW)/2;boardY=(H-boardH)/2;
  canvas.width=W;canvas.height=H;
}

function startGame(){
  sizeCanvas();
  board=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  score=0;level=1;gameOver=false;
  fallDelay=2000;
  document.getElementById('overlay').style.display='none';
  document.getElementById('score-val').textContent='0';
  document.getElementById('level-val').textContent='1';
  particles=[];
  spawnTile();
  if(animFrame)cancelAnimationFrame(animFrame);
  loop();
}

function getFallDelay(){
  // 2s at 0, 0.4s at high score
  return Math.max(400,2000-score*0.32);
}

function spawnTile(){
  nextColor=Math.floor(Math.random()*COLORS.length);
  activeCol=Math.floor(Math.random()*COLS);
  timerStart=performance.now();
  timerDuration=getFallDelay();
  updateNextPreview();
  updateTimerBar();
}

function updateNextPreview(){
  nctx.clearRect(0,0,36,36);
  nctx.fillStyle=COLORS[nextColor];
  nctx.shadowColor=COLORS[nextColor];
  nctx.shadowBlur=12;
  nctx.beginPath();
  nctx.roundRect(4,4,28,28,6);
  nctx.fill();
  nctx.shadowBlur=0;
}

let timerRAF;
function updateTimerBar(){
  cancelAnimationFrame(timerRAF);
  const bar=document.getElementById('timer-bar');
  function tick(){
    const elapsed=performance.now()-timerStart;
    const pct=Math.max(0,1-elapsed/timerDuration);
    bar.style.width=(pct*100)+'%';
    bar.style.background=pct>0.4?COLORS[nextColor]:'#ff3333';
    if(pct>0)timerRAF=requestAnimationFrame(tick);
  }
  timerRAF=requestAnimationFrame(tick);
}

function dropTile(){
  // Find lowest empty row in activeCol
  let row=-1;
  for(let r=ROWS-1;r>=0;r--){
    if(!board[r][activeCol]){row=r;break;}
  }
  if(row===-1){
    // Column full - game over
    endGame();return;
  }
  board[row][activeCol]=nextColor;
  // Particle burst
  const px=boardX+activeCol*tileSize+tileSize/2;
  const py=boardY+row*tileSize+tileSize/2;
  burst(px,py,COLORS[nextColor]);

  // Check matches
  const removed=cascadeCheck();
  updateScore(removed);

  // Check if any top row has tile → game over
  for(let c=0;c<COLS;c++){
    if(board[0][c]!==null){endGame();return;}
  }

  spawnTile();
}

function cascadeCheck(){
  let totalRemoved=0,chain=0;
  let keepGoing=true;
  while(keepGoing){
    keepGoing=false;
    const visited=Array.from({length:ROWS},()=>Array(COLS).fill(false));
    const toRemove=new Set();
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        if(board[r][c]!==null&&!visited[r][c]){
          const clr=board[r][c];
          const group=[];
          const stack=[[r,c]];
          while(stack.length){
            const[nr,nc]=stack.pop();
            if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
            if(visited[nr][nc]||board[nr][nc]!==clr)continue;
            visited[nr][nc]=true;
            group.push([nr,nc]);
            stack.push([nr-1,nc],[nr+1,nc],[nr,nc-1],[nr,nc+1]);
          }
          if(group.length>=3){
            group.forEach(([gr,gc])=>toRemove.add(gr+','+gc));
          }
        }
      }
    }
    if(toRemove.size>0){
      keepGoing=true;chain++;
      totalRemoved+=toRemove.size;
      toRemove.forEach(k=>{
        const[r,c]=k.split(',').map(Number);
        const px=boardX+c*tileSize+tileSize/2;
        const py=boardY+r*tileSize+tileSize/2;
        burstSmall(px,py,COLORS[board[r][c]]);
        board[r][c]=null;
      });
      // Gravity
      for(let c=0;c<COLS;c++){
        const col=[];
        for(let r=0;r<ROWS;r++)if(board[r][c]!==null)col.push(board[r][c]);
        for(let r=0;r<ROWS;r++)board[r][c]=r<ROWS-col.length?null:col[r-(ROWS-col.length)];
      }
      if(chain>=4)showCombo(chain,totalRemoved);
    }
  }
  return {removed:totalRemoved,chain};
}

function updateScore({removed,chain}){
  if(removed>0){
    const pts=Math.round(10*Math.pow(removed,1.5)*(chain>1?chain*.8:1));
    score+=pts;
    level=Math.floor(score/500)+1;
    document.getElementById('score-val').textContent=score;
    document.getElementById('level-val').textContent=level;
  }
}

function showCombo(chain,tiles){
  const el=document.getElementById('combo-text');
  el.textContent=`${chain}× COMBO! +${tiles} tiles`;
  el.style.color=COLORS[Math.floor(Math.random()*COLORS.length)];
  el.style.opacity='1';
  clearTimeout(el._t);
  el._t=setTimeout(()=>{el.style.opacity='0';},1200);
}

function endGame(){
  gameOver=true;
  cancelAnimationFrame(timerRAF);
  document.getElementById('timer-bar').style.width='0%';
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  document.querySelector('#overlay h1').textContent='GAME OVER';
  document.querySelector('#overlay h1').style.color='#ff3333';
  document.getElementById('final-score').style.display='block';
  document.getElementById('final-score').textContent='Score: '+score;
  document.getElementById('start-btn').textContent='▶ PLAY AGAIN';
}

// Particles
function burst(x,y,col){
  for(let i=0;i<16;i++){
    const a=Math.random()*Math.PI*2;
    const sp=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:.02+Math.random()*.025,sz:2+Math.random()*3,col});
  }
}
function burstSmall(x,y,col){
  for(let i=0;i<8;i++){
    const a=Math.random()*Math.PI*2;
    const sp=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:.035+Math.random()*.025,sz:1.5+Math.random()*2,col});
  }
}

// Input
document.addEventListener('keydown',e=>{
  if(gameOver)return;
  if(e.key==='ArrowLeft'&&activeCol>0)activeCol--;
  else if(e.key==='ArrowRight'&&activeCol<COLS-1)activeCol++;
  else if(e.key===' '||e.key==='ArrowDown'){dropTile();return;}
});

let tsX=null;
canvas.addEventListener('touchstart',e=>{tsX=e.touches[0].clientX;e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',e=>{
  if(tsX===null||gameOver)return;
  const dx=e.changedTouches[0].clientX-tsX;
  if(Math.abs(dx)<10){dropTile();}
  else if(dx<-20&&activeCol>0)activeCol--;
  else if(dx>20&&activeCol<COLS-1)activeCol++;
  tsX=null;
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(gameOver||tsX===null)return;
  const dx=e.touches[0].clientX-tsX;
  if(Math.abs(dx)>35){
    if(dx<0&&activeCol>0){activeCol--;tsX=e.touches[0].clientX;}
    else if(dx>0&&activeCol<COLS-1){activeCol++;tsX=e.touches[0].clientX;}
  }
  e.preventDefault();
},{passive:false});
canvas.addEventListener('click',e=>{
  if(gameOver)return;
  const bx=e.clientX-boardX;
  const col=Math.floor(bx/tileSize);
  if(col>=0&&col<COLS)activeCol=col;
  else dropTile();
});

// Timer-based drop
function checkTimer(){
  if(gameOver)return;
  const elapsed=performance.now()-timerStart;
  if(elapsed>=timerDuration){dropTile();}
}

function loop(){
  if(gameOver)return;
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // Draw board bg
  ctx.fillStyle='#050505';
  ctx.fillRect(boardX,boardY,boardW,boardH);

  // Grid lines
  ctx.strokeStyle='#111';ctx.lineWidth=1;
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(boardX,boardY+r*tileSize);ctx.lineTo(boardX+boardW,boardY+r*tileSize);ctx.stroke();}
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(boardX+c*tileSize,boardY);ctx.lineTo(boardX+c*tileSize,boardY+boardH);ctx.stroke();}

  // Draw tiles
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(board[r][c]!==null){
        const col=COLORS[board[r][c]];
        const x=boardX+c*tileSize,y=boardY+r*tileSize;
        const pad=2;
        ctx.fillStyle=col;
        ctx.shadowColor=col;ctx.shadowBlur=8;
        ctx.beginPath();
        ctx.roundRect(x+pad,y+pad,tileSize-pad*2,tileSize-pad*2,5);
        ctx.fill();
        ctx.shadowBlur=0;
      }
    }
  }

  // Draw active column highlight + falling preview
  if(!gameOver){
    const cx=boardX+activeCol*tileSize;
    ctx.fillStyle='#ffffff08';
    ctx.fillRect(cx,boardY,tileSize,boardH);

    // Find where it would land
    let landRow=-1;
    for(let r=ROWS-1;r>=0;r--){if(!board[r][activeCol]){landRow=r;break;}}

    // Ghost tile at landing row
    if(landRow>=0){
      const col=COLORS[nextColor];
      ctx.fillStyle=col+'44';
      ctx.strokeStyle=col+'88';ctx.lineWidth=1.5;
      const pad=2;
      ctx.beginPath();
      ctx.roundRect(cx+pad,boardY+landRow*tileSize+pad,tileSize-pad*2,tileSize-pad*2,5);
      ctx.fill();ctx.stroke();
    }

    // Active tile at top of column (falling animation)
    const elapsed=performance.now()-timerStart;
    const progress=Math.min(1,elapsed/timerDuration);
    const targetY=landRow>=0?boardY+landRow*tileSize:boardY;
    const startY=boardY-tileSize;
    const currentY=startY+(targetY-startY)*progress;

    const col=COLORS[nextColor];
    ctx.fillStyle=col;
    ctx.shadowColor=col;ctx.shadowBlur=16;
    const pad=2;
    ctx.beginPath();
    ctx.roundRect(cx+pad,currentY+pad,tileSize-pad*2,tileSize-pad*2,5);
    ctx.fill();
    ctx.shadowBlur=0;
  }

  // Particles
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life-=p.decay;
    ctx.globalAlpha=p.life;ctx.fillStyle=p.col;
    ctx.shadowColor=p.col;ctx.shadowBlur=4;
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;

  checkTimer();
  animFrame=requestAnimationFrame(loop);
}

addEventListener('resize',()=>{if(!gameOver)sizeCanvas();});
</script>
</body>
</html>
