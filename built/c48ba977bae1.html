<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Cascade</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
body { background: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; user-select: none; }
canvas { display: block; position: fixed; top: 0; left: 0; }
#hud {
  position: fixed; top: 0; left: 0; right: 0; height: 50px;
  display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
  z-index: 10; pointer-events: none; background: rgba(0,0,0,0.8);
  border-bottom: 1px solid #ffffff11;
}
#score { font-size: 1.3rem; font-weight: bold; color: #fff; }
#level-info { font-size: 0.8rem; color: #888; }
#next-preview { width: 36px; height: 36px; border-radius: 6px; border: 1px solid #333; }
#combo-text {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 2.5rem; font-weight: bold; color: #fff; text-shadow: 0 0 30px #fff;
  pointer-events: none; z-index: 50; opacity: 0;
}
#game-over {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  flex-direction: column; align-items: center; justify-content: center; z-index: 100; gap: 16px;
}
#game-over h2 { font-size: 2rem; color: #fff; }
#game-over .score-big { font-size: 3rem; font-weight: bold; color: #00e5ff; text-shadow: 0 0 20px #00e5ff; }
#restart-btn {
  padding: 12px 36px; background: transparent; border: 2px solid #fff;
  border-radius: 25px; color: #fff; font-size: 1rem; cursor: pointer;
}
#start-screen {
  position: fixed; inset: 0; background: #000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 1000; gap: 14px;
}
#start-screen h1 { font-size: 2.5rem; font-weight: bold; color: #00e5ff; text-shadow: 0 0 20px #00e5ff; }
#start-screen p { color: #666; font-size: 0.85rem; text-align: center; max-width: 280px; line-height: 1.6; }
#play-btn {
  padding: 13px 40px; background: transparent; border: 2px solid #00e5ff;
  border-radius: 28px; color: #00e5ff; font-size: 1rem; cursor: pointer;
  box-shadow: 0 0 16px #00e5ff44;
}
#swipe-hint {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  font-size: 0.7rem; color: #333; pointer-events: none; z-index: 10; text-align: center;
}
</style>
</head>
<body>
<div id="start-screen">
  <div style="font-size:3rem; filter: drop-shadow(0 0 12px #00e5ff)">🌊</div>
  <h1>NEON CASCADE</h1>
  <p>Swipe ← → to redirect the falling tile. Match 3+ tiles to cascade. Survive as long as you can!</p>
  <button id="play-btn">PLAY</button>
</div>
<canvas id="c"></canvas>
<div id="hud">
  <div id="score">0</div>
  <div id="level-info">Level 1</div>
  <canvas id="next-preview"></canvas>
</div>
<div id="combo-text"></div>
<div id="swipe-hint">← swipe to redirect →</div>
<div id="game-over">
  <h2>GAME OVER</h2>
  <div class="score-big" id="final-score-val">0</div>
  <div style="font-size:0.8rem;color:#555" id="best-val"></div>
  <button id="restart-btn">PLAY AGAIN</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const previewCanvas = document.getElementById('next-preview');
const pCtx = previewCanvas.getContext('2d');
previewCanvas.width = 36; previewCanvas.height = 36;

const COLS = 7, ROWS = 12;
const COLORS = [
  { fill: '#00e5ff', glow: '#00e5ff' }, // cyan
  { fill: '#ff00cc', glow: '#ff00cc' }, // magenta
  { fill: '#aaff00', glow: '#aaff00' }, // lime
  { fill: '#ffaa00', glow: '#ffaa00' }, // amber
  { fill: '#aa44ff', glow: '#aa44ff' }, // violet
  { fill: '#ff6644', glow: '#ff6644' }, // coral
];

let board = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
let cw, ch, tileW, tileH, boardOffX, boardOffY;
let score = 0, level = 1, best = 0;
let started = false, gameOver = false;

// Falling tile state
let falling = null; // { col, colorIdx, y (pixel), vy, phase: 'falling'|'landing' }
let nextColorIdx = 0;
let activeCol = 0; // which column the tile falls in

// Timing
let fallDelay = 2000; // ms per tile fall
let lastFallTime = 0;
let lastTime = 0;
let animTiles = []; // { r, c, alpha, scale } for clear animations
let ripples = []; // screen ripple effects

function resize() {
  cw = canvas.width = window.innerWidth;
  ch = canvas.height = window.innerHeight;
  const hudH = 50;
  const maxTileW = Math.floor((cw * 0.95) / COLS);
  const maxTileH = Math.floor((ch - hudH - 20) / ROWS);
  const tileSize = Math.min(maxTileW, maxTileH, 54);
  tileW = tileH = tileSize;
  boardOffX = Math.floor((cw - tileW * COLS) / 2);
  boardOffY = hudH + 10;
}
resize(); window.addEventListener('resize', resize);

function randColor() { return Math.floor(Math.random() * COLORS.length); }
function newTile() {
  const colorIdx = nextColorIdx;
  nextColorIdx = randColor();
  activeCol = Math.floor(Math.random() * COLS);
  falling = {
    col: activeCol,
    colorIdx,
    y: boardOffY - tileH,
    phase: 'falling'
  };
  drawPreview();
}

function drawPreview() {
  pCtx.clearRect(0, 0, 36, 36);
  const c = COLORS[nextColorIdx];
  pCtx.fillStyle = c.fill + '33';
  roundRect(pCtx, 2, 2, 32, 32, 6);
  pCtx.fill();
  pCtx.shadowColor = c.glow; pCtx.shadowBlur = 8;
  pCtx.fillStyle = c.fill;
  roundRect(pCtx, 6, 6, 24, 24, 5);
  pCtx.fill();
  pCtx.shadowBlur = 0;
}

function roundRect(c2d, x, y, w, h, r) {
  c2d.beginPath();
  c2d.moveTo(x+r, y);
  c2d.lineTo(x+w-r, y); c2d.arcTo(x+w, y, x+w, y+r, r);
  c2d.lineTo(x+w, y+h-r); c2d.arcTo(x+w, y+h, x+w-r, y+h, r);
  c2d.lineTo(x+r, y+h); c2d.arcTo(x, y+h, x, y+h-r, r);
  c2d.lineTo(x, y+r); c2d.arcTo(x, y, x+r, y, r);
  c2d.closePath();
}

function landRow(col) {
  for (let r = ROWS - 1; r >= 0; r--) {
    if (!board[r][col]) return r;
  }
  return -1; // column full
}

function landTile() {
  if (!falling) return;
  const { col, colorIdx } = falling;
  const row = landRow(col);
  if (row < 0) { triggerGameOver(); return; }
  board[row][col] = colorIdx;
  falling = null;
  checkCascades();
  // Check top row filled
  for (let c = 0; c < COLS; c++) {
    if (board[0][c] !== null) { triggerGameOver(); return; }
  }
  updateLevel();
  setTimeout(() => { if (!gameOver) newTile(); }, 200);
}

function checkCascades() {
  let anyCleared = true;
  let chainCount = 0;
  while (anyCleared) {
    anyCleared = false;
    // Flood fill from every cell to find groups of 3+
    const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (board[r][c] === null || visited[r][c]) continue;
        const color = board[r][c];
        const group = [];
        const queue = [[r, c]];
        visited[r][c] = true;
        while (queue.length) {
          const [cr, cc] = queue.shift();
          group.push([cr, cc]);
          [[cr-1,cc],[cr+1,cc],[cr,cc-1],[cr,cc+1]].forEach(([nr,nc]) => {
            if (nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!visited[nr][nc]&&board[nr][nc]===color) {
              visited[nr][nc]=true; queue.push([nr,nc]);
            }
          });
        }
        if (group.length >= 3) {
          const pts = Math.floor(10 * Math.pow(group.length, 1.5));
          score += pts;
          chainCount++;
          group.forEach(([gr, gc]) => {
            animTiles.push({ r: gr, c: gc, colorIdx: board[gr][gc], alpha: 1, scale: 1 });
            board[gr][gc] = null;
          });
          // Ripple
          const cx = boardOffX + (group.reduce((s,[r2,c2])=>s+c2,0)/group.length+0.5)*tileW;
          const cy = boardOffY + (group.reduce((s,[r2,c2])=>s+r2,0)/group.length+0.5)*tileH;
          ripples.push({ x: cx, y: cy, r: 0, maxR: tileW*2, life: 1, color: COLORS[color].fill });
          anyCleared = true;
        }
      }
    }
    if (anyCleared) {
      // Gravity: tiles fall down
      for (let c = 0; c < COLS; c++) {
        const col = [];
        for (let r = 0; r < ROWS; r++) if (board[r][c] !== null) col.push(board[r][c]);
        for (let r = 0; r < ROWS; r++) board[r][c] = r < ROWS - col.length ? null : col[r - (ROWS - col.length)];
      }
    }
  }
  if (chainCount >= 4) showCombo('CHAIN x' + chainCount + '!');
  document.getElementById('score').textContent = score.toLocaleString();
}

function showCombo(txt) {
  const el = document.getElementById('combo-text');
  el.textContent = txt; el.style.opacity = '1'; el.style.transform = 'translate(-50%,-50%) scale(1.2)';
  el.style.transition = 'none';
  setTimeout(() => {
    el.style.transition = 'opacity 0.8s, transform 0.8s';
    el.style.opacity = '0'; el.style.transform = 'translate(-50%,-50%) scale(0.9)';
  }, 500);
}

function updateLevel() {
  level = 1 + Math.floor(score / 500);
  const minDelay = 400;
  fallDelay = Math.max(minDelay, 2000 - (level - 1) * 100);
  document.getElementById('level-info').textContent = 'Level ' + level;
}

function triggerGameOver() {
  gameOver = true;
  if (score > best) best = score;
  document.getElementById('final-score-val').textContent = score.toLocaleString();
  document.getElementById('best-val').textContent = best > score ? '' : '🏆 New Best!';
  document.getElementById('game-over').style.display = 'flex';
}

function restart() {
  board = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  score = 0; level = 1; gameOver = false; falling = null;
  animTiles = []; ripples = [];
  fallDelay = 2000;
  document.getElementById('score').textContent = '0';
  document.getElementById('level-info').textContent = 'Level 1';
  document.getElementById('game-over').style.display = 'none';
  nextColorIdx = randColor();
  lastFallTime = performance.now();
  newTile();
}

// Swipe handling
let touchStartX = 0, touchStartY = 0;
function handleSwipe(dx) {
  if (!falling || gameOver) return;
  if (dx < -30) {
    activeCol = Math.max(0, activeCol - 1);
    falling.col = activeCol;
  } else if (dx > 30) {
    activeCol = Math.min(COLS - 1, activeCol + 1);
    falling.col = activeCol;
  }
}

canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) handleSwipe(dx);
  e.preventDefault();
}, { passive: false });

window.addEventListener('keydown', e => {
  if (!started || gameOver) return;
  if (e.key === 'ArrowLeft') handleSwipe(-100);
  if (e.key === 'ArrowRight') handleSwipe(100);
});

// Draw
function drawTile(r, c, colorIdx, alpha = 1, scale = 1) {
  const x = boardOffX + c * tileW + tileW * (1 - scale) / 2;
  const y = boardOffY + r * tileH + tileH * (1 - scale) / 2;
  const w = tileW * scale - 4, h = tileH * scale - 4;
  if (w <= 0 || h <= 0) return;
  const col = COLORS[colorIdx];
  ctx.globalAlpha = alpha;
  ctx.shadowColor = col.glow; ctx.shadowBlur = 12;
  ctx.fillStyle = col.fill + '44';
  roundRect(ctx, x + 2, y + 2, w, h, 6);
  ctx.fill();
  ctx.shadowColor = col.glow; ctx.shadowBlur = 8;
  ctx.fillStyle = col.fill;
  roundRect(ctx, x + 4, y + 4, w - 4, h - 4, 5);
  ctx.fill();
  ctx.shadowBlur = 0; ctx.globalAlpha = 1;
}

function draw(now) {
  ctx.clearRect(0, 0, cw, ch);
  if (!started) return;

  // Board background
  ctx.fillStyle = '#080808';
  ctx.fillRect(boardOffX, boardOffY, tileW * COLS, tileH * ROWS);
  // Grid lines
  ctx.strokeStyle = '#ffffff08'; ctx.lineWidth = 1;
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(boardOffX, boardOffY + r*tileH); ctx.lineTo(boardOffX + COLS*tileW, boardOffY + r*tileH); ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(boardOffX + c*tileW, boardOffY); ctx.lineTo(boardOffX + c*tileW, boardOffY + ROWS*tileH); ctx.stroke();
  }

  // Column highlight for active falling
  if (falling) {
    const col = COLORS[falling.colorIdx];
    ctx.fillStyle = col.fill + '0a';
    ctx.fillRect(boardOffX + falling.col * tileW, boardOffY, tileW, tileH * ROWS);
    // Ghost tile
    const ghostRow = landRow(falling.col);
    if (ghostRow >= 0) {
      ctx.globalAlpha = 0.15;
      drawTile(ghostRow, falling.col, falling.colorIdx);
      ctx.globalAlpha = 1;
    }
  }

  // Board tiles
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c] !== null) drawTile(r, c, board[r][c]);
    }
  }

  // Anim tiles (clearing)
  animTiles = animTiles.filter(t => t.alpha > 0);
  for (const t of animTiles) {
    drawTile(t.r, t.c, t.colorIdx, t.alpha, t.scale);
    t.alpha -= 0.06; t.scale += 0.05;
  }

  // Ripples
  ripples = ripples.filter(r => r.life > 0);
  for (const r of ripples) {
    ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI*2);
    ctx.strokeStyle = r.color + Math.floor(r.life * 200).toString(16).padStart(2,'0');
    ctx.lineWidth = 3; ctx.stroke();
    r.r += 3; r.life -= 0.05;
  }

  // Falling tile
  if (falling) {
    const tx = boardOffX + falling.col * tileW;
    const col = COLORS[falling.colorIdx];
    ctx.globalAlpha = 1;
    ctx.shadowColor = col.glow; ctx.shadowBlur = 15;
    ctx.fillStyle = col.fill + '55';
    roundRect(ctx, tx + 2, falling.y + 2, tileW - 4, tileH - 4, 6);
    ctx.fill();
    ctx.fillStyle = col.fill;
    roundRect(ctx, tx + 4, falling.y + 4, tileW - 8, tileH - 8, 5);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function loop(now) {
  if (!started) { requestAnimationFrame(loop); return; }
  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;

  if (!gameOver && falling) {
    // Move falling tile to target y over fallDelay
    const targetRow = landRow(falling.col);
    const targetY = targetRow >= 0 ? boardOffY + targetRow * tileH : boardOffY;
    const progress = Math.min(1, (now - lastFallTime) / fallDelay);
    const startY = boardOffY - tileH;
    falling.y = startY + (targetY - startY) * progress;
    if (progress >= 1) {
      lastFallTime = now;
      landTile();
    }
  }

  draw(now);
  requestAnimationFrame(loop);
}

document.getElementById('play-btn').addEventListener('click', () => {
  document.getElementById('start-screen').style.display = 'none';
  started = true;
  nextColorIdx = randColor();
  lastFallTime = performance.now();
  lastTime = performance.now();
  newTile();
  requestAnimationFrame(loop);
});

document.getElementById('restart-btn').addEventListener('click', restart);

requestAnimationFrame(loop);
</script>
</body>
</html>
